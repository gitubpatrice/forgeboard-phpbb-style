<!-- INCLUDE overall_header.html -->

<header class="forge-faq-header">
	<p class="forge-kicker">{L_FAQ_TITLE}</p>
	<h1>{L_FAQ_TITLE}</h1>
</header>

<section class="forge-faq-index" id="faqlinks">
	<!-- BEGIN faq_block -->
		<article class="forge-faq-index-card">
			<h2>{faq_block.BLOCK_TITLE}</h2>
			<ul>
			<!-- BEGIN faq_row -->
				<li><a href="#f{faq_block.S_ROW_COUNT}r{faq_block.faq_row.S_ROW_COUNT}">{faq_block.faq_row.FAQ_QUESTION}</a></li>
			<!-- END faq_row -->
			</ul>
		</article>
	<!-- END faq_block -->
</section>

<!-- BEGIN faq_block -->
	<section class="forge-faq-section">
		<header class="forge-faq-section-head">
			<p class="forge-kicker">{L_FAQ_TITLE}</p>
			<h2>{faq_block.BLOCK_TITLE}</h2>
		</header>

		<div class="forge-faq-grid">
		<!-- BEGIN faq_row -->
			<article class="forge-faq-item" id="f{faq_block.S_ROW_COUNT}r{faq_block.faq_row.S_ROW_COUNT}">
				<h3>{faq_block.faq_row.FAQ_QUESTION}</h3>
				<div class="forge-faq-answer">
					{faq_block.faq_row.FAQ_ANSWER}
				</div>
				<a href="#faqlinks" class="forge-faq-top">
					<i class="icon fa-chevron-up fa-fw" aria-hidden="true"></i><span>{L_BACK_TO_TOP}</span>
				</a>
			</article>
		<!-- END faq_row -->
		</div>
	</section>
<!-- END faq_block -->

<!-- INCLUDE jumpbox.html -->
<!-- INCLUDE overall_footer.html -->
